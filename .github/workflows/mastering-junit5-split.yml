# Scheduling settings used for this distribution
# algorithm: lpt
# risk_factor: 1
name: build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
env:
  DISPLAY: :99
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Start Xvfb
        run: Xvfb :99 &
      - name: "Run tests with "
        run: mvn -B test -DskipTests -Drat.skip=true
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
    container: eclipse-temurin:21-jdk
  test-job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Start Xvfb
        run: Xvfb :99 &
      - name: Start services
        run: |-
          docker compose up -d
          docker compose wait --no-deps 2>/dev/null || sleep 5
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Detect available cores
        id: cores # test
        run: |-
          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
      - name: Run tests
        run: mvn test -Dtest=CucumberTest -DfailIfNoTests=false -Dsurefire.forkCount=${{
          steps.cores.outputs.count }} -Dsurefire.reuseForks=true
      - name: Stop services
        if: always()
        run: docker compose down
    container: eclipse-temurin:21-jdk
    needs:
      - build
