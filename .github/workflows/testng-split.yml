# Scheduling settings used for this distribution
# algorithm: lpt
# risk_factor: 1
name: Test
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ (github.ref == 'refs/heads/master' || github.ref ==
    'refs/heads/release' ) && format('ci-main-{0}', github.sha) ||
    format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true
jobs:
  matrix_prep:
    name: Matrix Preparation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      MATRIX_JOBS: 7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: set-matrix
        run: |
          npm ci --prefix .github/workflows
          node .github/workflows/matrix.mjs
  build:
    name: Matrix Preparation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      MATRIX_JOBS: 7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: set-matrix
        run: |
          npm ci --prefix .github/workflows
          node .github/workflows/matrix.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
    container: eclipse-temurin:21-jdk
  test-job-1:
    name: Matrix Preparation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      MATRIX_JOBS: 7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: set-matrix
        run: |
          npm ci --prefix .github/workflows
          node .github/workflows/matrix.mjs
      - &a1
        name: Start services
        run: |-
          docker compose up -d
          docker compose wait --no-deps 2>/dev/null || sleep 5
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - &a2
        name: Detect available cores
        id: cores
        run: |-
          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
      - name: Run tests
        run: mvn test
