# Scheduling settings used for this distribution
# algorithm: lpt
# risk_factor: 1
name: Java CI
on:
  - push
  - pull_request
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'
      - name: Build with Maven
        run: mvn --errors --show-version --batch-mode --no-transfer-progress -Ddoclint=all -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
    name: Build
  test-job-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'
      - &a1
        name: Start services
        run: |-
          docker compose up -d
          docker compose wait --no-deps 2>/dev/null || sleep 5
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - &a2
        name: Detect available cores
        id: cores
        run: |-
          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
