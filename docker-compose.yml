services:
  testsplit:
    build: .
    container_name: testsplit
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "4g"
    volumes:
      - testsplit-data:/app/.data # mount volume
    command: npm run test:all

  api:
    build: .
    container_name: testsplit-api
    volumes:
      - testsplit-data:/app/.data
    ports:
      - "3001:3001"
    command: npm run api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes: # defining top level volume
  testsplit-data:
