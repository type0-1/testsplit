stages:
  - unit tests
  - integration tests

unit_tests:
  stage: unit tests
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG} # We create a cache for each branch
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npm test
  
integration_tests:
  stage: integration tests
  image: node:20
  script:
    - npm ci
    - npm run test:integration